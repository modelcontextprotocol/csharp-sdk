name: Build and Test

on:
  # Manual trigger
  workflow_dispatch:

  # Run CI for all pushes to main
  push:
    branches: ["main"]

  # Run CI for pull requests to all branches, but only if code changed
  pull_request:
    paths:
      - ".github/workflows/ci-*.yml"
      - "*.sln"
      - "*.props"
      - "Makefile"
      - "global.json"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "tests/**"
      - "samples/**"
      - "docs/**"

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        configuration: [Debug, Release]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
    - name: 📥 Clone the repo
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

    - name: 🔧 Set up .NET
      uses: actions/setup-dotnet@baa11fbfe1d6520db94683bd5c7a3818018e4309 # v5.1.0
      with:
        dotnet-version: |
          10.0.x
          9.0.x

    - name: 🔧 Set up Node.js
      uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
      with:
        node-version: '20'

    - name: 📦 Install pinned npm dependencies for tests
      run: npm ci

    - name: 🏗️ Build
      run: make build CONFIGURATION=${{ matrix.configuration }}

    - name: 🧪 Test
      # TODO: Remove DOTNET_RuntimeAsync=0 workaround once the .NET runtime fix is available.
      # Tracked by: https://github.com/dotnet/runtime/issues/126325
      # xUnit v3 test host hangs intermittently on .NET 10 with RuntimeAsync enabled.
      env:
        DOTNET_RuntimeAsync: "0"
      run: make test CONFIGURATION=${{ matrix.configuration }}

    - name: 🧪 AOT Compatibility
      if: matrix.configuration == 'Release'
      run: make test-aot CONFIGURATION=${{ matrix.configuration }}

    - name: 📦 Pack
      if: matrix.configuration == 'Release'
      run: make pack CONFIGURATION=${{ matrix.configuration }}

    - name: 📚 Generate docs
      run: make generate-docs CONFIGURATION=${{ matrix.configuration }}

    - name: 📤 Upload test results artifact
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: testresults-${{ matrix.os }}-${{ matrix.configuration }}
        path: |
          artifacts/testresults/**
          artifacts/bin/*Tests/*/xunit-runtest-diag.log

  publish-coverage:
    if: github.actor != 'dependabot[bot]'
    needs: build
    uses: ./.github/workflows/ci-code-coverage.yml
    secrets: inherit
