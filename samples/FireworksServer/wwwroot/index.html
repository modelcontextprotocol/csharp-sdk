<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fireworks Show Control</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8fafc;
      --muted: #94a3b8;
      --panel: rgba(10, 14, 32, .78);
      --line: rgba(125, 249, 255, .22);
      --accent: #7df9ff;
      --accent2: #f0abfc;
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      background:
        radial-gradient(circle at 22% 20%, rgba(76, 29, 149, .34), transparent 28%),
        radial-gradient(circle at 82% 12%, rgba(8, 145, 178, .25), transparent 25%),
        #030511;
      color: var(--ink);
      font-family: Inter, "Segoe UI", system-ui, sans-serif;
    }
    canvas { position: fixed; inset: 0; width: 100%; height: 100%; }
    .chrome { position: fixed; inset: 0; pointer-events: none; padding: 20px; }
    .topbar {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
      text-transform: uppercase; letter-spacing: .16em;
    }
    .eyebrow { color: var(--accent); font-size: 10px; font-weight: 800; }
    h1 {
      margin: 4px 0 0; max-width: 760px; font-size: clamp(25px, 4vw, 56px);
      line-height: .94; letter-spacing: -.04em; text-transform: none;
      text-shadow: 0 0 32px rgba(125, 249, 255, .3);
    }
    .status {
      display: flex; align-items: center; gap: 8px; padding: 8px 11px;
      border: 1px solid var(--line); border-radius: 999px; background: var(--panel);
      color: var(--muted); font-size: 9px; white-space: nowrap;
      backdrop-filter: blur(14px);
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #f59e0b; box-shadow: 0 0 12px currentColor; }
    .connected .dot { background: #34d399; }
    .controls {
      pointer-events: auto; position: absolute; left: 20px; right: 20px; bottom: 20px;
      display: grid; grid-template-columns: 1.2fr .8fr .8fr 1.3fr auto; gap: 10px;
      padding: 12px; border: 1px solid var(--line); border-radius: 14px;
      background: var(--panel); box-shadow: 0 18px 60px rgba(0,0,0,.35);
      backdrop-filter: blur(18px);
    }
    body.audience .controls { display: none; }
    .field { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
    label { color: var(--muted); font-size: 9px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }
    input, select {
      width: 100%; min-height: 36px; border: 1px solid rgba(148,163,184,.2);
      border-radius: 8px; outline: none; padding: 7px 9px; background: rgba(2,6,23,.72);
      color: var(--ink); font: inherit;
    }
    input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(125,249,255,.09); }
    input[type="range"] { padding: 0; accent-color: var(--accent); }
    button {
      align-self: end; min-height: 36px; border: 0; border-radius: 8px; padding: 0 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #050816;
      font-weight: 900; letter-spacing: .08em; cursor: pointer; text-transform: uppercase;
    }
    button:hover { filter: brightness(1.12); transform: translateY(-1px); }
    button:disabled { filter: grayscale(1); cursor: wait; transform: none; }
    .telemetry {
      position: absolute; left: 20px; bottom: 20px; display: none; gap: 8px;
      color: var(--muted); font: 10px ui-monospace, "Cascadia Code", monospace;
    }
    body.audience .telemetry { display: flex; }
    .chip { padding: 7px 9px; border: 1px solid var(--line); border-radius: 7px; background: var(--panel); backdrop-filter: blur(12px); }
    .finale {
      position: absolute; left: 50%; top: 51%; transform: translate(-50%, -50%) scale(.88);
      width: min(90vw, 1100px); text-align: center; opacity: 0;
      font-size: clamp(34px, 8vw, 108px); font-weight: 950; line-height: .9;
      letter-spacing: -.055em; text-wrap: balance; text-transform: uppercase;
      background: linear-gradient(90deg, #fff, var(--accent), var(--accent2), #fff);
      background-size: 200% 100%; color: transparent; background-clip: text;
      filter: drop-shadow(0 0 24px rgba(125,249,255,.7));
      transition: opacity .45s, transform .45s;
    }
    .finale.visible { opacity: 1; transform: translate(-50%, -50%) scale(1); animation: shimmer 2s linear infinite; }
    @keyframes shimmer { to { background-position: -200% 0; } }
    @media (max-width: 820px) {
      .chrome { padding: 12px; }
      .controls { left: 12px; right: 12px; bottom: 12px; grid-template-columns: 1fr 1fr; max-height: 42vh; overflow: auto; }
      .field:first-child, .field:nth-child(4), button { grid-column: span 2; }
      .status { padding: 6px 8px; }
    }
  </style>
</head>
<body>
  <canvas id="stage"></canvas>
  <div class="chrome">
    <div class="topbar">
      <div>
        <div class="eyebrow">MCP / SIGNALR / LIVE</div>
        <h1 id="showTitle">Awaiting the next show</h1>
      </div>
      <div class="status" id="status"><span class="dot"></span><span id="statusText">INITIALIZING</span></div>
    </div>
    <div class="finale" id="finale"></div>
    <div class="controls">
      <div class="field">
        <label for="title">Show title</label>
        <input id="title" value="Visual Studio After Dark" maxlength="60">
      </div>
      <div class="field">
        <label for="theme">Palette</label>
        <select id="theme">
          <option>Aurora</option><option>Cyberpunk</option><option>Ocean</option>
          <option>Sunset</option><option>Celebration</option>
        </select>
      </div>
      <div class="field">
        <label for="intensity">Intensity <span id="intensityValue">4</span>/5</label>
        <input id="intensity" type="range" min="1" max="5" value="4">
      </div>
      <div class="field">
        <label for="message">Finale message</label>
        <input id="message" value="BUILD SOMETHING BRILLIANT" maxlength="60">
      </div>
      <button id="launch">Launch show</button>
    </div>
    <div class="telemetry">
      <div class="chip" id="audienceTheme">NO SHOW</div>
      <div class="chip" id="audienceCues">0 CUES</div>
      <div class="chip">SIGNALR SYNC</div>
    </div>
  </div>

  <script>
    const embedded = window.parent !== window;
    document.body.classList.add(embedded ? 'mcp-app' : 'audience');

    const canvas = document.getElementById('stage');
    const ctx = canvas.getContext('2d');
    const finale = document.getElementById('finale');
    const status = document.getElementById('status');
    const statusText = document.getElementById('statusText');
    let width = 0, height = 0, dpr = 1;
    let stars = [], rockets = [], particles = [], timers = [];
    let lastShow = null;

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const random = mulberry32(20260728);
      stars = Array.from({ length: Math.floor(width / 7) }, () => ({
        x: random() * width, y: random() * height * .68, r: random() * 1.2 + .2, a: random() * .65 + .2
      }));
    }

    function mulberry32(seed) {
      return function() {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    class Rocket {
      constructor(cue, intensity) {
        this.cue = cue;
        this.intensity = intensity;
        this.x0 = width * (.42 + Math.random() * .16);
        this.y0 = height + 10;
        this.x1 = width * cue.x;
        this.y1 = height * cue.y;
        this.started = performance.now();
        this.duration = 520 + Math.random() * 260;
        this.done = false;
      }
      draw(now) {
        const p = Math.min(1, (now - this.started) / this.duration);
        const eased = 1 - Math.pow(1 - p, 3);
        const x = this.x0 + (this.x1 - this.x0) * eased;
        const y = this.y0 + (this.y1 - this.y0) * eased;
        ctx.beginPath();
        ctx.moveTo(x, y + 20);
        ctx.lineTo(x, y);
        ctx.strokeStyle = this.cue.primaryColor;
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = '#fff';
        ctx.fillRect(x - 1, y - 1, 2, 2);
        if (p >= 1 && !this.done) {
          this.done = true;
          burst(this.cue, this.intensity);
        }
      }
    }

    class Particle {
      constructor(x, y, vx, vy, color, gravity, life) {
        this.x = this.px = x; this.y = this.py = y;
        this.vx = vx; this.vy = vy; this.color = color;
        this.gravity = gravity; this.life = this.maxLife = life;
      }
      update() {
        this.px = this.x; this.py = this.y;
        this.vx *= .982; this.vy = this.vy * .982 + this.gravity;
        this.x += this.vx; this.y += this.vy; this.life--;
      }
      draw() {
        ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
        ctx.beginPath(); ctx.moveTo(this.px, this.py); ctx.lineTo(this.x, this.y);
        ctx.strokeStyle = this.color; ctx.lineWidth = 1.65; ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }

    function burst(cue, intensity) {
      const count = 34 + intensity * 10;
      const x = cue.x * width, y = cue.y * height;
      for (let i = 0; i < count; i++) {
        let angle = Math.PI * 2 * i / count;
        let speed = (2.2 + Math.random() * 2.8) * cue.scale;
        let gravity = cue.shape === 'willow' ? .055 : .035;
        if (cue.shape === 'star') speed *= i % 2 ? .48 : 1.15;
        if (cue.shape === 'spiral') angle += i * .075;
        if (cue.shape === 'chrysanthemum') speed *= .72 + Math.sin(i * 2.4) * .16;
        particles.push(new Particle(
          x, y, Math.cos(angle) * speed, Math.sin(angle) * speed,
          i % 3 ? cue.primaryColor : cue.secondaryColor,
          gravity, 58 + Math.random() * 42));
      }
      for (let i = 0; i < intensity * 4; i++) {
        const angle = Math.random() * Math.PI * 2;
        particles.push(new Particle(
          x, y, Math.cos(angle) * Math.random() * 1.7, Math.sin(angle) * Math.random() * 1.7,
          '#ffffff', .02, 28 + Math.random() * 25));
      }
    }

    function drawBackdrop(now) {
      ctx.fillStyle = 'rgba(3, 5, 17, .21)';
      ctx.fillRect(0, 0, width, height);
      for (const star of stars) {
        ctx.globalAlpha = star.a * (.72 + Math.sin(now * .001 + star.x) * .28);
        ctx.fillStyle = '#dbeafe';
        ctx.fillRect(star.x, star.y, star.r, star.r);
      }
      ctx.globalAlpha = 1;
      const horizon = height * .84;
      const gradient = ctx.createLinearGradient(0, horizon, 0, height);
      gradient.addColorStop(0, 'rgba(15,23,42,.82)');
      gradient.addColorStop(1, '#02030a');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, horizon, width, height - horizon);
      ctx.fillStyle = 'rgba(3,5,17,.96)';
      for (let x = 0; x < width; x += 52) {
        const building = 20 + ((x * 17) % 70);
        ctx.fillRect(x, horizon - building, 44, building + 2);
      }
    }

    function animate(now) {
      drawBackdrop(now);
      for (const rocket of rockets) rocket.draw(now);
      rockets = rockets.filter(rocket => !rocket.done);
      for (const particle of particles) { particle.update(); particle.draw(); }
      particles = particles.filter(particle => particle.life > 0);
      requestAnimationFrame(animate);
    }

    function startShow(show) {
      if (!show || !Array.isArray(show.cues)) return;
      lastShow = show;
      timers.forEach(clearTimeout);
      timers = [];
      rockets = [];
      finale.classList.remove('visible');
      document.getElementById('showTitle').textContent = show.title;
      document.getElementById('audienceTheme').textContent = String(show.theme).toUpperCase();
      document.getElementById('audienceCues').textContent = show.cues.length + ' CUES';
      setStatus('SHOW LIVE', true);
      applyInputs(show);

      for (const cue of show.cues) {
        timers.push(setTimeout(() => rockets.push(new Rocket(cue, show.intensity)), cue.delayMilliseconds));
      }
      const lastDelay = Math.max(...show.cues.map(cue => cue.delayMilliseconds));
      timers.push(setTimeout(() => {
        finale.textContent = show.finaleMessage;
        finale.classList.add('visible');
      }, lastDelay + 650));
      timers.push(setTimeout(() => finale.classList.remove('visible'), lastDelay + 4300));
    }

    function applyInputs(show) {
      if (show.title) document.getElementById('title').value = show.title;
      if (show.theme) document.getElementById('theme').value = show.theme;
      if (show.intensity) {
        document.getElementById('intensity').value = show.intensity;
        document.getElementById('intensityValue').textContent = show.intensity;
      }
      if (show.finaleMessage) document.getElementById('message').value = show.finaleMessage;
    }

    function setStatus(text, connected) {
      statusText.textContent = text;
      status.classList.toggle('connected', !!connected);
    }

    let nextRequestId = 1;
    const pendingRequests = new Map();
    function sendRequest(method, params) {
      const id = nextRequestId++;
      return new Promise((resolve, reject) => {
        pendingRequests.set(id, { resolve, reject });
        window.parent.postMessage({ jsonrpc: '2.0', id, method, params: params || {} }, '*');
      });
    }
    function sendNotification(method, params) {
      window.parent.postMessage({ jsonrpc: '2.0', method, params: params || {} }, '*');
    }

    window.addEventListener('message', event => {
      const message = event.data;
      if (!message || message.jsonrpc !== '2.0') return;
      if (message.id !== undefined && pendingRequests.has(message.id)) {
        const pending = pendingRequests.get(message.id);
        pendingRequests.delete(message.id);
        message.error ? pending.reject(new Error(message.error.message)) : pending.resolve(message.result);
        return;
      }
      if (message.method === 'ui/notifications/tool-input') {
        applyInputs(message.params.arguments || {});
      }
      if (message.method === 'ui/notifications/tool-result') {
        startShow(message.params.structuredContent);
      }
    });

    async function initializeMcpApp() {
      try {
        await sendRequest('ui/initialize', {
          protocolVersion: '2026-01-26',
          appCapabilities: {},
          appInfo: { name: 'fireworks-stage', version: '1.0.0' }
        });
        sendNotification('ui/notifications/initialized', {});
        setStatus('MCP APP READY', true);
      } catch (error) {
        setStatus('MCP APP ERROR', false);
      }
    }

    async function launchFromApp() {
      const button = document.getElementById('launch');
      button.disabled = true;
      setStatus('CHOREOGRAPHING', true);
      try {
        const result = await sendRequest('tools/call', {
          name: 'launch_fireworks',
          arguments: {
            title: document.getElementById('title').value,
            theme: document.getElementById('theme').value,
            intensity: Number(document.getElementById('intensity').value),
            finaleMessage: document.getElementById('message').value
          }
        });
        startShow(result.structuredContent);
      } catch (error) {
        setStatus('LAUNCH FAILED', false);
      } finally {
        button.disabled = false;
      }
    }

    async function connectSignalR() {
      try {
        setStatus('CONNECTING SIGNALR', false);
        const response = await fetch('/show/negotiate?negotiateVersion=1', { method: 'POST' });
        if (!response.ok) throw new Error('Negotiate failed');
        const negotiation = await response.json();
        if (!negotiation.availableTransports.some(item => item.transport === 'WebSockets')) {
          throw new Error('WebSockets unavailable');
        }

        const scheme = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const socket = new WebSocket(
          `${scheme}//${location.host}/show?id=${encodeURIComponent(negotiation.connectionToken)}`);
        let buffer = '';
        let pingTimer;

        socket.addEventListener('open', () => {
          socket.send('{"protocol":"json","version":1}\u001e');
        });
        socket.addEventListener('message', event => {
          buffer += event.data;
          const frames = buffer.split('\u001e');
          buffer = frames.pop();
          for (const frame of frames) {
            if (!frame) continue;
            const message = JSON.parse(frame);
            if (message.type === 1 && message.target === 'ShowLaunched') {
              startShow(message.arguments[0]);
            } else if (message.type === undefined) {
              setStatus('SIGNALR CONNECTED', true);
              pingTimer = setInterval(() => {
                if (socket.readyState === WebSocket.OPEN) socket.send('{"type":6}\u001e');
              }, 10000);
            }
          }
        });
        socket.addEventListener('close', () => {
          clearInterval(pingTimer);
          setStatus('RECONNECTING', false);
          setTimeout(connectSignalR, 1500);
        });
        socket.addEventListener('error', () => socket.close());
      } catch (error) {
        setStatus('RECONNECTING', false);
        setTimeout(connectSignalR, 1500);
      }
    }

    document.getElementById('intensity').addEventListener('input', event => {
      document.getElementById('intensityValue').textContent = event.target.value;
    });
    document.getElementById('launch').addEventListener('click', launchFromApp);
    window.addEventListener('resize', resize);
    resize();
    requestAnimationFrame(animate);
    embedded ? initializeMcpApp() : connectSignalR();
  </script>
</body>
</html>
